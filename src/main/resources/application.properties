spring.application.name=OnlineToyStore
server.port=${PORT:8080}
data.file.path=${TOYMART_DATA_DIR:./data/}
toymart.upload.root=${TOYMART_UPLOAD_ROOT:./uploads}
toymart.upload.toy-dir=${TOYMART_UPLOAD_ROOT:./uploads}/toys
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Email integration.
# For viva/localhost, use Gmail with a Gmail App Password:
# TOYMART_MAIL_PROVIDER=gmail
# TOYMART_GMAIL_APP_PASSWORD=xxxx xxxx xxxx xxxx
# For hosted fallback, use Brevo only when needed:
# TOYMART_MAIL_PROVIDER=brevo
# BREVO_API_KEY=your_key
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=toymart.web@gmail.com
spring.mail.password=${TOYMART_GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

toymart.mail.enabled=${TOYMART_MAIL_ENABLED:true}
toymart.mail.provider=${TOYMART_MAIL_PROVIDER:gmail}
toymart.mail.from=toymart.web@gmail.com
toymart.admin.email=toymart.web@gmail.com
brevo.api.key=${BREVO_API_KEY:}
