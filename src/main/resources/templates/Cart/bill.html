<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cart Bill - ToyMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bill-body">
<main class="bill-page">
    <div class="bill-toolbar">
        <a href="/orders/history" class="btn btn-outline">Back to Orders</a>
        <button type="button" class="btn btn-primary" onclick="window.print()">Download / Save PDF</button>
    </div>

    <section class="bill-card">
        <div class="bill-header">
            <div>
                <p class="section-eyebrow">ToyMart Invoice</p>
                <h1>Cart Bill</h1>
            </div>
            <div class="bill-brand">ToyMart</div>
        </div>

        <div class="bill-meta">
            <div><span>Customer</span><strong th:text="${customerName}">Customer</strong></div>
            <div><span>Orders</span><strong th:text="${orders.size()}">0</strong></div>
            <div><span>Payment</span><strong th:text="${orders[0].paymentMethod == 'ONLINE' ? 'Card Payment' : 'Cash on Delivery'}">Payment</strong></div>
            <div><span>Status</span><strong th:text="${orders[0].paymentStatus}">PAID</strong></div>
        </div>

        <table class="bill-table">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Toy</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderId}">ORD</td>
                <td th:text="${order.toyName}">Toy</td>
                <td th:text="${order.quantity}">1</td>
                <td>Rs. <span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">0.00</span></td>
            </tr>
            </tbody>
        </table>

        <div class="bill-total">
            <span>Grand Total</span>
            <strong>Rs. <span th:text="${#numbers.formatDecimal(billTotal,1,'COMMA',2,'POINT')}">0.00</span></strong>
        </div>
    </section>
</main>
</body>
</html>
