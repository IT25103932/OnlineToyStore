<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Review — Online Toy Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .star-selector { display:flex; flex-direction:row-reverse; justify-content:flex-end; gap:4px; margin-top:4px; }
        .star-selector input { display:none; }
        .star-selector label { font-size:2rem; color:#ddd; cursor:pointer; transition:color 0.15s; }
        .star-selector label:hover,
        .star-selector label:hover ~ label,
        .star-selector input:checked ~ label { color:#FFB300; }
    </style>
</head>
<body>
<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🧸 <span>ToyMart</span></a>
    <ul class="navbar-nav">

        <li><a href="/toys">Toys</a></li>

        <!-- Admin only links -->
        <li th:if="${isAdmin}">
            <a href="/dashboard">Dashboard</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/users">Users</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/orders">All Orders</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/inventory">Inventory</a>
        </li>

        <!-- Any logged-in user -->
        <li th:if="${isCustomer}">
            <a href="/cart">🛒 Cart</a>
        </li>
        <li th:if="${isCustomer}">
            <a href="/orders/history">My Orders</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/reviews">Reviews</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/users/profile"
               style="color:var(--accent);">
                👤 <span th:text="${loggedInUser?.username}">
                </span>
            </a>
        </li>

        <!-- Guest only -->
        <li th:if="${!isLoggedIn}">
            <a href="/users/login">Login</a>
        </li>
        <li th:if="${!isLoggedIn}">
            <a href="/users/register">Register</a>
        </li>

        <!-- Logout -->
        <li th:if="${isLoggedIn}">
            <a href="/users/logout"
               style="color:rgba(255,150,150,0.85);">
                Logout
            </a>
        </li>
    </ul>
</nav>

    <div class="page-header">
        <h1 style="font-size:1.7rem; color:var(--secondary);">
            ✏️ Edit Review
        </h1>
        <a href="/reviews" class="btn btn-outline">← Back to Reviews</a>
    </div>

        Editing:
        <strong style="color:var(--secondary);"

    </p>
