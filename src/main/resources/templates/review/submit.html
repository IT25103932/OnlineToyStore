<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submit Review — ToyVault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .star-picker { display:flex; gap:6px; margin:4px 0; }
        .star-picker input[type=radio] { display:none; }
        .star-picker label { font-size:1.6rem; cursor:pointer; color:var(--text-faint); transition:color .15s; }
        .star-picker label:hover, .star-picker label:hover ~ label { color:var(--accent); }
        .star-picker input:checked ~ label { color:var(--text-faint); }
        .star-picker input:checked + label, .star-picker label:hover { color:var(--accent); }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🧸</div><div class="brand-text">ToyVault<small>Admin Panel</small></div></div>
    <span class="nav-label">Overview</span>
    <a href="/" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
    <span class="nav-label">Catalogue</span>
    <a href="/toys" class="nav-item"><span class="nav-icon">⊡</span> Toys</a>
    <a href="/inventory" class="nav-item"><span class="nav-icon">⊞</span> Inventory</a>
    <span class="nav-label">Commerce</span>
    <a href="/cart" class="nav-item"><span class="nav-icon">⊟</span> Cart</a>
    <a href="/orders" class="nav-item"><span class="nav-icon">⊕</span> Orders</a>
    <span class="nav-label">Community</span>
    <a href="/reviews" class="nav-item active"><span class="nav-icon">⊙</span> Reviews</a>
    <span class="nav-label">Accounts</span>
    <a href="/users" class="nav-item"><span class="nav-icon">⊚</span> Users</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-item"><span class="nav-icon">↩</span> Logout</a></div>
</aside>

<main class="main">
    <div class="page-header">
        <div><div class="eyebrow">Community</div><h1>Submit a Review</h1></div>
        <div class="page-actions"><a href="/reviews" class="btn btn-ghost">← Reviews</a></div>
    </div>

    <div class="form-wrap">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/reviews/submit}" method="post">
            <div class="form-grid">
                <div class="form-group span-2">
                    <label class="form-label">Toy *</label>
                    <select class="form-select" name="toyId" required>
                        <option value="">— Select a toy —</option>
                        <option th:each="toy : ${toys}" th:value="${toy.toyId}" th:text="${toy.name}"></option>
                    </select>
                </div>
                <div class="form-group span-2">
                    <label class="form-label">Your Rating *</label>
                    <div class="star-picker" id="starPicker">
                        <input type="radio" name="rating" id="s5" value="5"/><label for="s5">★</label>
                        <input type="radio" name="rating" id="s4" value="4"/><label for="s4">★</label>
                        <input type="radio" name="rating" id="s3" value="3"/><label for="s3">★</label>
                        <input type="radio" name="rating" id="s2" value="2"/><label for="s2">★</label>
                        <input type="radio" name="rating" id="s1" value="1"/><label for="s1">★</label>
                    </div>
                </div>
                <div class="form-group span-2">
                    <label class="form-label">Your Review *</label>
                    <textarea class="form-textarea" name="comment" required placeholder="Share your experience with this toy…" style="min-height:120px;"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit Review</button>
                <a href="/reviews" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
