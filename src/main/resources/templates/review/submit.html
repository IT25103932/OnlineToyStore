<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submit Review — Online Toy Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .star-selector { display:flex; flex-direction:row-reverse; justify-content:flex-end; gap:4px; margin-top:4px; }
        .star-selector input { display:none; }
        .star-selector label { font-size:2rem; color:#ddd; cursor:pointer; transition:color 0.15s; }
        .star-selector label:hover,
        .star-selector label:hover ~ label,
        .star-selector input:checked ~ label { color:#FFB300; }
    </style>
</head>
<body>
<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🧸 <span>ToyMart</span></a>
    <ul class="navbar-nav">

        <li><a href="/toys">Toys</a></li>

        <!-- Admin only links -->
        <li th:if="${isAdmin}">
            <a href="/dashboard">Dashboard</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/users">Users</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/orders">All Orders</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/inventory">Inventory</a>
        </li>

        <!-- Any logged-in user -->
        <li th:if="${isCustomer}">
            <a href="/cart" class="nav-cart-link" data-cart-open>Cart <span class="nav-cart-badge" th:text="${cartItemCount}">0</span></a>
        </li>
        <li th:if="${isCustomer}">
            <a href="/orders/history">My Orders</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/reviews">Reviews</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/users/profile"
               style="color:var(--accent);">
                👤 <span th:text="${loggedInUser?.username}">
                </span>
            </a>
        </li>

        <!-- Guest only -->
        <li th:if="${!isLoggedIn}">
            <a href="/users/login">Login</a>
        </li>
        <li th:if="${!isLoggedIn}">
            <a href="/users/register">Register</a>
        </li>

        <!-- Logout -->
        <li th:if="${isLoggedIn}">
            <a href="/users/logout"
               style="color:rgba(255,150,150,0.85);">
                Logout
            </a>
        </li>
    </ul>
</nav>

<div class="page">
    <div class="page-header">
        <h1 style="font-size:1.7rem; color:var(--secondary);">
            ✏️ Write a Review
        </h1>
        <a href="/reviews" class="btn btn-outline">← Back to Reviews</a>
    </div>

    <div class="card" style="max-width:640px;">
        <form th:action="@{/reviews/submit}" method="post">

            <!-- Select Toy -->
            <div class="form-group" style="margin-bottom:1.1rem;">
                <label>Select Toy</label>
                <select name="toyId" required>
                    <option value="">-- Choose a toy --</option>
                    <option th:each="toy : ${toys}"
                            th:value="${toy.toyId}"
                            th:text="${toy.name}"
                            th:selected="${toy.toyId == review.toyId}">
                    </option>
                </select>
            </div>

            <!-- Star Rating -->
            <div class="form-group" style="margin-bottom:1.1rem;">
                <label>Your Rating</label>
                <div class="star-selector">
                    <input type="radio" id="s5" name="rating" value="5"/>
                    <label for="s5" title="5 stars">★</label>
                    <input type="radio" id="s4" name="rating" value="4"/>
                    <label for="s4" title="4 stars">★</label>
                    <input type="radio" id="s3" name="rating" value="3" checked/>
                    <label for="s3" title="3 stars">★</label>
                    <input type="radio" id="s2" name="rating" value="2"/>
                    <label for="s2" title="2 stars">★</label>
                    <input type="radio" id="s1" name="rating" value="1"/>
                    <label for="s1" title="1 star">★</label>
                </div>
            </div>

            <!-- Comment -->
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label>Your Comment</label>
                <textarea name="comment" rows="4"
                          placeholder="Share your experience with this toy..."
                          required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Submit Review
                </button>
                <a href="/reviews" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>
</div>
<div th:if="${isCustomer}" th:replace="~{fragments/cart-drawer :: cartDrawer}"></div>
<script th:if="${isCustomer}" th:src="@{/js/cart-drawer.js}"></script>
</body>
</html>
