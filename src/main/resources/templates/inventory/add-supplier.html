<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Supplier — Online Toy Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .page { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem; }

        /* Form card */
        .card { background: #fff; border-radius: 14px; border: 1px solid var(--border);
                box-shadow: 0 2px 14px rgba(27,42,74,0.08); padding: 2rem; }

        /* Two-column grid for form fields */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

        /* Full width field — spans both columns */
        .form-group.full { grid-column: 1 / -1; }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

        .form-group label { font-size: 0.8rem; font-weight: 700;
                            color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }

        .form-group input,
        .form-group select,
        .form-group textarea { padding: 10px 13px; border: 1.5px solid var(--border);
                                border-radius: 9px; font-family: 'Nunito', sans-serif;
                                font-size: 0.92rem; color: var(--text);
                                transition: border-color 0.15s; width: 100%; box-sizing: border-box; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { outline: none; border-color: var(--primary); }

        .form-group textarea { resize: vertical; min-height: 70px; }

        /* Buttons row at the bottom */
        .form-actions { display: flex; gap: 0.75rem; margin-top: 1.75rem;
                        padding-top: 1.25rem; border-top: 1px solid var(--border); }

        @media(max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🧸 <span>ToyStore</span></a>
    <ul class="navbar-nav">

        <li><a href="/toys">Toys</a></li>

        <!-- Admin only links -->
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/dashboard">Dashboard</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/users">Users</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/orders">All Orders</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/inventory">Inventory</a>
        </li>

        <!-- Any logged-in user -->
        <li th:if="${session.loggedInUser != null}">
            <a href="/cart">🛒 Cart</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/orders/history">My Orders</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/reviews">Reviews</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/users/profile"
               style="color:var(--accent);">
                👤 <span th:text="${session.loggedInUser?.username}">
                </span>
            </a>
        </li>

        <!-- Guest only -->
        <li th:if="${session.loggedInUser == null}">
            <a href="/users/login">Login</a>
        </li>
        <li th:if="${session.loggedInUser == null}">
            <a href="/users/register">Register</a>
        </li>

        <!-- Logout -->
        <li th:if="${session.loggedInUser != null}">
            <a href="/users/logout"
               style="color:rgba(255,150,150,0.85);">
                Logout
            </a>
        </li>
    </ul>
</nav>

<div class="page">

    <!-- Page header -->
    <div class="page-header">
        <h1 style="font-family:'Fredoka One',cursive; font-size:1.7rem;
                   color:var(--secondary); display:flex; align-items:center; gap:8px;">
            ➕ Add New Supplier
        </h1>
        <a href="/suppliers" class="btn btn-outline">← Back to Suppliers</a>
    </div>

    <div class="card">
        <!--
            POST to /suppliers/add
            @ModelAttribute in the controller maps each input name
            to the matching field in Supplier.java
        -->
        <form action="/suppliers/add" method="post">

            <div class="form-grid">

                <!-- Company name — required field -->
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="name"
                           placeholder="e.g. ABC Toys Ltd" required/>
                </div>

                <!-- Supply category dropdown -->
                <div class="form-group">
                    <label>Supply Category</label>
                    <select name="supplyCategory">
                        <option value="ALL">All Categories</option>
                        <option value="EDUCATIONAL">🎓 Educational</option>
                        <option value="ELECTRONIC">🔌 Electronic</option>
                        <option value="SOFT">🧸 Soft Toys</option>
                        <option value="GENERAL">🎁 General</option>
                    </select>
                </div>

                <!-- Contact person -->
                <div class="form-group">
                    <label>Contact Person</label>
                    <input type="text" name="contactPerson"
                           placeholder="e.g. John Silva"/>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" name="email"
                           placeholder="supplier@email.com"/>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone"
                           placeholder="07XXXXXXXX"/>
                </div>

                <!-- Spacer to keep grid aligned -->
                <div class="form-group">
                    <label>&nbsp;</label>
                </div>

                <!-- Address — full width -->
                <div class="form-group full">
                    <label>Address</label>
                    <textarea name="address"
                              placeholder="No. 45, Industrial Zone, Colombo">
                    </textarea>
                </div>

            </div>

            <!-- Form action buttons -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    ✅ Add Supplier
                </button>
                <a href="/suppliers" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
