<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Toy — Online Toy Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🧸 <span>ToyStore</span></a>
    <ul class="navbar-nav">

        <li><a href="/toys">Toys</a></li>

        <!-- Admin only links -->
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/dashboard">Dashboard</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/users">Users</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/orders">All Orders</a>
        </li>
        <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
            <a href="/inventory">Inventory</a>
        </li>

        <!-- Any logged-in user -->
        <li th:if="${session.loggedInUser != null}">
            <a href="/cart">🛒 Cart</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/orders/history">My Orders</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/reviews">Reviews</a>
        </li>
        <li th:if="${session.loggedInUser != null}">
            <a href="/users/profile"
               style="color:var(--accent);">
                👤 <span th:text="${session.loggedInUser?.username}">
                </span>
            </a>
        </li>

        <!-- Guest only -->
        <li th:if="${session.loggedInUser == null}">
            <a href="/users/login">Login</a>
        </li>
        <li th:if="${session.loggedInUser == null}">
            <a href="/users/register">Register</a>
        </li>

        <!-- Logout -->
        <li th:if="${session.loggedInUser != null}">
            <a href="/users/logout"
               style="color:rgba(255,150,150,0.85);">
                Logout
            </a>
        </li>
    </ul>
</nav>

<div class="page">

    <!-- Page Header -->
    <div class="page-header">
        <h1>
            <span class="icon">➕</span>
            Add New Toy
        </h1>
        <a href="/toys" class="btn btn-outline">← Back to List</a>
    </div>

    <!-- Form Card -->
    <div class="card" style="max-width: 760px;">

        <form action="/toys/add" method="post">

            <div class="form-grid">

                <div class="form-group">
                    <label for="name">Toy Name</label>
                    <input type="text" id="name" name="name"
                           placeholder="e.g. LEGO Classic Set" required/>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="EDUCATIONAL">🎓 Educational</option>
                        <option value="ELECTRONIC">⚡ Electronic</option>
                        <option value="SOFT">🐻 Soft Toy</option>
                        <option value="GENERAL">🎯 General</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price (Rs.)</label>
                    <input type="number" id="price" name="price"
                           step="0.01" min="0" placeholder="0.00" required/>
                </div>

                <div class="form-group">
                    <label for="stockQuantity">Stock Quantity</label>
                    <input type="number" id="stockQuantity" name="stockQuantity"
                           min="0" placeholder="0" required/>
                </div>

                <div class="form-group full">
                    <label for="description">Description</label>
                    <textarea id="description" name="description"
                              placeholder="Describe the toy — age range, features, materials..."></textarea>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">🧸 Add Toy</button>
                <a href="/toys" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
