<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Toy — Online Toy Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🧸 <span>ToyMart</span></a>
    <ul class="navbar-nav">

        <li><a href="/toys">Toys</a></li>

        <!-- Admin only links -->
        <li th:if="${isAdmin}">
            <a href="/dashboard">Dashboard</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/users">Users</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/orders">All Orders</a>
        </li>
        <li th:if="${isAdmin}">
            <a href="/inventory">Inventory</a>
        </li>

        <!-- Any logged-in user -->
        <li th:if="${isCustomer}">
            <a href="/cart">🛒 Cart</a>
        </li>
        <li th:if="${isCustomer}">
            <a href="/orders/history">My Orders</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/reviews">Reviews</a>
        </li>
        <li th:if="${isLoggedIn}">
            <a href="/users/profile"
               style="color:var(--accent);">
                👤 <span th:text="${loggedInUser?.username}">
                </span>
            </a>
        </li>

        <!-- Guest only -->
        <li th:if="${!isLoggedIn}">
            <a href="/users/login">Login</a>
        </li>
        <li th:if="${!isLoggedIn}">
            <a href="/users/register">Register</a>
        </li>

        <!-- Logout -->
        <li th:if="${isLoggedIn}">
            <a href="/users/logout"
               style="color:rgba(255,150,150,0.85);">
                Logout
            </a>
        </li>
    </ul>
</nav>

<div class="page">

    <!-- Page Header -->
    <div class="page-header">
        <h1>
            <span class="icon">✏️</span>
            Edit Toy
        </h1>
        <a href="/toys" class="btn btn-outline">← Back to List</a>
    </div>

    <!-- Toy ID display -->
    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; font-weight:600;">
        Editing:
        <span style="color:var(--secondary); font-weight:800;"
              th:text="${toy.toyId}"></span>
    </p>

    <!-- Form Card -->
    <div class="card" style="max-width: 760px;">

        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/toys/edit/{id}(id=${toy.toyId})}" method="post" enctype="multipart/form-data">

            <div class="form-grid">

                <div class="form-group">
                    <label for="name">Toy Name</label>
                    <input type="text" id="name" name="name"
                           th:value="${toy.name}" required/>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="EDUCATIONAL"
                                th:selected="${toy.category == 'EDUCATIONAL'}">
                            🎓 Educational
                        </option>
                        <option value="ELECTRONIC"
                                th:selected="${toy.category == 'ELECTRONIC'}">
                            ⚡ Electronic
                        </option>
                        <option value="SOFT"
                                th:selected="${toy.category == 'SOFT'}">
                            🐻 Soft Toy
                        </option>
                        <option value="GENERAL"
                                th:selected="${toy.category == 'GENERAL'}">
                            🎯 General
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price (Rs.)</label>
                    <input type="number" id="price" name="price"
                           step="0.01" min="0"
                           th:value="${toy.price}" required/>
                </div>

                <div class="form-group">
                    <label for="stockQuantity">Stock Quantity</label>
                    <input type="number" id="stockQuantity" name="stockQuantity"
                           min="0" th:value="${toy.stockQuantity}" required/>
                </div>

                <div class="form-group full">
                    <label for="description">Description</label>
                    <textarea id="description" name="description"
                              th:text="${toy.description}"></textarea>
                </div>

                <div class="form-group full" th:if="${toy.imageUrl != null and !#strings.isEmpty(toy.imageUrl)}">
                    <label>Current Photo</label>
                    <div class="current-photo-preview">
                        <img th:src="${toy.imageUrl}" th:alt="${toy.name}"/>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="imageFile">Replace Photo</label>
                    <input type="file" id="imageFile" name="imageFile"
                           accept="image/jpeg,image/png,image/gif,image/webp"/>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                <a href="/toys" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
