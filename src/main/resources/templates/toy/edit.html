<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Toy</title>
</head>
<body>

<h1>Edit Toy</h1>

<form th:action="@{/toys/edit/{id}(id=${toy.toyId})}" method="post">

    <label>Name:</label><br/>
    <input type="text" name="name" th:value="${toy.name}" required/><br/><br/>

    <label>Category:</label><br/>
    <select name="category">
        <option value="EDUCATIONAL" th:selected="${toy.category == 'EDUCATIONAL'}">Educational</option>
        <option value="ELECTRONIC" th:selected="${toy.category == 'ELECTRONIC'}">Electronic</option>
        <option value="SOFT" th:selected="${toy.category == 'SOFT'}">Soft Toy</option>
        <option value="GENERAL" th:selected="${toy.category == 'GENERAL'}">General</option>
    </select><br/><br/>

    <label>Description:</label><br/>
    <textarea name="description" rows="3" cols="30"
              th:text="${toy.description}"></textarea><br/><br/>

    <label>Price (Rs.):</label><br/>
    <input type="number" name="price" step="0.01"
           th:value="${toy.price}" required/><br/><br/>

    <label>Stock Quantity:</label><br/>
    <input type="number" name="stockQuantity"
           th:value="${toy.stockQuantity}" required/><br/><br/>

    <button type="submit">Update Toy</button>
    <a href="/toys">Cancel</a>

</form>

</body>
</html>
