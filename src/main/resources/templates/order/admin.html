<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Management — ToyVault Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🧸</div><div class="brand-text">ToyVault<small>Admin Panel</small></div></div>
    <span class="nav-label">Overview</span>
    <a href="/" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
    <span class="nav-label">Catalogue</span>
    <a href="/toys" class="nav-item"><span class="nav-icon">⊡</span> Toys</a>
    <a href="/inventory" class="nav-item"><span class="nav-icon">⊞</span> Inventory</a>
    <span class="nav-label">Commerce</span>
    <a href="/cart" class="nav-item"><span class="nav-icon">⊟</span> Cart</a>
    <a href="/orders" class="nav-item active"><span class="nav-icon">⊕</span> Orders</a>
    <span class="nav-label">Community</span>
    <a href="/reviews" class="nav-item"><span class="nav-icon">⊙</span> Reviews</a>
    <span class="nav-label">Accounts</span>
    <a href="/users" class="nav-item"><span class="nav-icon">⊚</span> Users</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-item"><span class="nav-icon">↩</span> Logout</a></div>
</aside>

<main class="main">
    <div class="page-header">
        <div><div class="eyebrow">Commerce</div><h1>Order Management</h1><p>Monitor and update all store orders.</p></div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-wrap">
        <div class="table-header"><h2>All Orders</h2></div>
        <table>
            <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Payment</th><th>Status</th><th>Update Status</th></tr></thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td class="td-mono" th:text="'#' + ${order.orderId}"></td>
                    <td class="td-name" th:text="${order.userId}"></td>
                    <td class="td-muted" th:text="${order.orderDate}"></td>
                    <td style="font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent);"
                        th:text="'Rs.' + ${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}"></td>
                    <td><span class="badge badge-muted" th:text="${order.paymentMethod}"></span></td>
                    <td>
                        <span th:text="${order.status}"
                              th:classappend="${order.status == 'DELIVERED'} ? 'badge badge-success' :
                                              (${order.status == 'SHIPPED'} ? 'badge badge-info' :
                                              (${order.status == 'PENDING'} ? 'badge badge-accent' : 'badge badge-danger'))">
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/orders/admin/status/{id}(id=${order.orderId})}" method="post" style="display:flex; gap:6px;">
                            <select class="form-select" name="status" style="width:130px; padding:5px 8px; font-size:0.8rem;">
                                <option value="PENDING"   th:selected="${order.status == 'PENDING'}">Pending</option>
                                <option value="SHIPPED"   th:selected="${order.status == 'SHIPPED'}">Shipped</option>
                                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                            </select>
                            <button type="submit" class="btn btn-ghost btn-sm">✓</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${orders == null or orders.isEmpty()}">
                    <td colspan="7"><div class="empty-state"><span class="empty-icon">📦</span><h3>No orders yet</h3></div></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
