<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Online Toy Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .checkout-layout {
      max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 1.5rem; align-items: start;
    }
    .alert-error {
      background: #FFE0E0; color: #C62828; border: 1px solid #FFCDD2;
      border-radius: 9px; padding: 0.75rem 1rem; font-size: 0.88rem;
      font-weight: 600; margin-bottom: 1.25rem;
    }
    .summary-card {
      background: #fff; border-radius: 14px; padding: 1.4rem;
      border: 1px solid var(--border); box-shadow: 0 2px 14px rgba(27,42,74,0.08);
      position: sticky; top: 80px;
    }
    .summary-card h3 {
      font-family: 'Fredoka One', cursive; font-size: 1.15rem;
      color: var(--secondary); margin-bottom: 1rem;
    }
    .sum-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 0.5rem; }
    .sum-row.total {
      font-weight: 800; font-size: 1rem; border-top: 1px solid var(--border);
      padding-top: 0.75rem; margin-top: 0.5rem;
    }
    .sum-row.total span:last-child {
      font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: var(--primary);
    }
    .pay-method { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
    .pay-option {
      border: 2px solid var(--border); border-radius: 10px;
      padding: 0.9rem; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .pay-option:has(input:checked) {
      border-color: var(--primary); background: rgba(255,107,53,0.05);
    }
    .pay-option input { display: none; }
    .pay-option .pay-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .pay-option .pay-label { font-size: 0.82rem; font-weight: 700; color: var(--secondary); }

    @media(max-width: 700px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand"><span>ToyStore</span></a>
  <ul class="navbar-nav">
    <li><a href="/">Dashboard</a></li>
    <li><a href="/users">Users</a></li>
    <li><a href="/toys">Toys</a></li>
    <li><a href="/cart">Cart</a></li>
    <li><a href="/orders" class="active">Orders</a></li>
    <li><a href="/reviews">Reviews</a></li>
    <li><a href="/inventory">Inventory</a></li>
  </ul>
</nav>

<div style="max-width:900px; margin:0 auto; padding:1.75rem 1.25rem 0;">
  <div class="page-header">
    <h1 style="font-family:'Fredoka One',cursive; font-size:1.7rem; color:var(--secondary); display:flex; align-items:center; gap:8px;">
      Checkout
      <a href="/orders" class="btn btn-outline">← All Orders</a>
    </h1>
  </div>
</div>

<div class="checkout-layout">
  <div>
    <div class="card">
      <div class="alert-error" th:if="${error}" th:text="${error}"></div>
      <form action="/orders/place" method="post" id="checkout-form">
        <div class="form-group" style="margin-bottom:1rem;">
          <label>Select Toy</label>
          <select name="toyId" id="toySelect" onchange="updateSummary()" required>
            <option value="">-- Choose a toy --</option>
            <option th:each="toy : ${toys}"
                    th:value="${toy.toyId}"
                    th:text="${toy.name} + ' — Rs.' + ${toy.price}"
                    th:attr="data-price=${toy.price}, data-stock=${toy.stockQuantity}"
                    th:selected="${selectedToy != null && toy.toyId == selectedToy.toyId}">
            </option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
          <label>Quantity</label>
          <input type="number" name="quantity" id="qtyInput" value="1" min="1" max="99" oninput="updateSummary()" required/>
          <small style="color:var(--muted); font-size:0.75rem;" id="stockHint"></small>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem;">
          <label>Payment Method</label>
          <div class="pay-method">
            <label class="pay-option">
              <input type="radio" name="paymentMethod" value="ONLINE" checked onchange="updateSummary()"/>
              <span class="pay-icon">💳</span>
              <span class="pay-label">Online Payment</span>
            </label>
            <label class="pay-option">
              <input type="radio" name="paymentMethod" value="COD" onchange="updateSummary()"/>
              <span class="pay-icon">💵</span>
              <span class="pay-label">Cash on Delivery</span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; font-size:1rem; padding:0.8rem;">
          Place Order →
        </button>
      </form>
    </div>
  </div>

  <div class="summary-card">
    <h3>Order Summary</h3>
    <div class="sum-row">
      <span>Toy</span>
      <span id="sum-toy" style="font-weight:700; color:var(--secondary);">—</span>
    </div>
    <div class="sum-row">
      <span>Unit Price</span>
      <span id="sum-price">—</span>
    </div>
    <div class="sum-row">
      <span>Quantity</span>
      <span id="sum-qty">—</span>
    </div>
    <div class="sum-row">
      <span>Payment</span>
      <span id="sum-method">Online</span>
    </div>
    <div class="sum-row total">
      <span>Total</span>
      <span id="sum-total">—</span>
    </div>
  </div>
</div>

<script>
  function updateSummary() {
    const sel = document.getElementById('toySelect');
    const qtyInput = document.getElementById('qtyInput');
    const qty = parseInt(qtyInput.value) || 0;
    const opt = sel.options[sel.selectedIndex];
    const method = document.querySelector('input[name="paymentMethod"]:checked');

    if (sel.value && opt.dataset.price) {
      const price = parseFloat(opt.dataset.price);
      const stock = parseInt(opt.dataset.stock);
      const total = price * qty;
      const toyName = opt.text.split(' — ')[0];

      document.getElementById('sum-toy').textContent = toyName;
      document.getElementById('sum-price').textContent = 'Rs.' + price.toFixed(2);
      document.getElementById('sum-qty').textContent = qty;
      document.getElementById('sum-total').textContent = 'Rs.' + total.toFixed(2);
      document.getElementById('stockHint').textContent = stock + ' units available';

      if (method) {
        document.getElementById('sum-method').textContent =
                method.value === 'ONLINE' ? 'Online Payment' : 'Cash on Delivery';
      }
    } else {
      ['sum-toy', 'sum-price', 'sum-qty', 'sum-total'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('stockHint').textContent = '';
    }
  }
  window.onload = updateSummary;
</script>
</body>
</html>
