<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify Email - ToyMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<nav class="navbar">
    <a href="/" class="navbar-brand">ToyMart</a>
    <ul class="navbar-nav">
        <li><a href="/toys">Catalog</a></li>
        <li><a href="/users/login">Login</a></li>
    </ul>
</nav>
<main class="auth-shell auth-login-shell">
    <section class="auth-panel">
        <aside class="auth-visual auth-visual-login">
            <a href="/" class="auth-panel-brand">ToyMart</a>
            <div class="auth-visual-copy">
                <h2>Check your inbox.</h2>
                <p>We sent a verification code to confirm your ToyMart email address.</p>
            </div>
            <p class="auth-copyright">&copy; 2026 Online Toy Store</p>
        </aside>
        <section class="auth-form-card">
            <p class="section-eyebrow">Email verification</p>
            <h1>Verify Your Email</h1>
            <p class="auth-subtitle">Enter the 6-digit code sent to <strong th:text="${email}">email</strong>.</p>
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>
            <form th:action="@{/users/verify-email}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="code">Verification Code</label>
                    <input id="code" name="code" type="text" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required autofocus/>
                </div>
                <button type="submit" class="auth-submit">Verify Email</button>
            </form>
        </section>
    </section>
</main>
</body>
</html>
