<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password - ToyMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<nav class="navbar">
    <a href="/" class="navbar-brand">ToyMart</a>
    <ul class="navbar-nav">
        <li><a href="/toys">Catalog</a></li>
        <li><a href="/users/login">Login</a></li>
    </ul>
</nav>
<main class="auth-shell auth-login-shell">
    <section class="auth-panel">
        <aside class="auth-visual auth-visual-login">
            <a href="/" class="auth-panel-brand">ToyMart</a>
            <div class="auth-visual-copy">
                <h2>Reset securely.</h2>
                <p>Enter your account email and we will send a one-time password reset code.</p>
            </div>
            <p class="auth-copyright">&copy; 2026 Online Toy Store</p>
        </aside>
        <section class="auth-form-card">
            <p class="section-eyebrow">Password recovery</p>
            <h1>Forgot Password</h1>
            <p class="auth-subtitle">We will email an OTP to your registered email address.</p>
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>
            <form th:action="@{/users/forgot-password}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required autofocus/>
                </div>
                <button type="submit" class="auth-submit">Send OTP</button>
            </form>
            <div class="auth-footer">
                Remembered it? <a href="/users/login">Back to login</a>
            </div>
        </section>
    </section>
</main>
</body>
</html>
