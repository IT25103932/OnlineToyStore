<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Online Toy Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">🧸 <span>ToyMart</span></a>
  <ul class="navbar-nav">
    <li><a href="/toys">Catalog</a></li>
    <li th:if="${session.loggedInUser == null}"><a href="/users/login" class="active">Login</a></li>
    <li th:if="${session.loggedInUser == null}"><a href="/users/register">Register</a></li>
  </ul>
</nav>

<main class="auth-wrapper">
  <section class="auth-card">
    <p class="section-eyebrow">Secure access</p>
    <h1>Welcome back</h1>
    <p>Sign in to continue shopping or managing the store.</p>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/users/login}" method="post">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter your username" required autofocus/>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
    </form>

    <div class="auth-footer">
      New customer?
      <a href="/users/register">Create an account</a>
    </div>
  </section>
</main>
</body>
</html>
