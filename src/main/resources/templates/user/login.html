<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — ToyVault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body { align-items: center; justify-content: center; background: var(--bg); }
        body::before { content:''; position:fixed; top:-20%; right:-15%; width:500px; height:500px;
            border-radius:50%; background:radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%); pointer-events:none; }
        .auth-box { width: 100%; max-width: 420px; }
        .auth-brand { text-align: center; margin-bottom: 36px; }
        .auth-brand .icon { width:56px; height:56px; background:var(--accent); border-radius:16px;
            display:inline-flex; align-items:center; justify-content:center; font-size:1.6rem;
            margin-bottom:16px; box-shadow: 0 0 40px var(--accent-glow); }
        .auth-brand h1 { font-family:'DM Serif Display',serif; font-size:1.8rem; color:var(--text); }
        .auth-brand p { color: var(--text-muted); font-size:0.875rem; margin-top:4px; }
        .auth-footer { text-align:center; margin-top:20px; font-size:0.82rem; color:var(--text-muted); }
        .auth-footer a { color:var(--accent); font-weight:600; }
        .sidebar { display: none; }
        .main { margin-left: 0; display:flex; align-items:center; justify-content:center; width:100%; }
    </style>
</head>
<body>
<main class="main">
    <div class="auth-box">
        <div class="auth-brand">
            <div class="icon">🧸</div>
            <h1>ToyVault</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="form-wrap" style="max-width:100%;">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group" style="margin-bottom:14px;">
                    <label class="form-label">Username or Email</label>
                    <input class="form-input" type="text" name="username" required placeholder="your@email.com" autofocus/>
                </div>
                <div class="form-group" style="margin-bottom:22px;">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" name="password" required placeholder="••••••••"/>
                </div>
                <button type="submit" class="btn btn-primary w-full" style="width:100%; justify-content:center; padding:11px;">Sign In →</button>
            </form>
        </div>
        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</main>
</body>
</html>
