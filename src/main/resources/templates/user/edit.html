<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit User — Online Toy Store</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
<!-- PASTE THIS NAVBAR into EVERY .html template -->
<nav class="navbar">
  <a href="/" class="navbar-brand">🧸 <span>ToyStore</span></a>
  <ul class="navbar-nav">

    <li><a href="/toys">Toys</a></li>

    <!-- Admin only links -->
    <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
      <a href="/dashboard">Dashboard</a>
    </li>
    <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
      <a href="/users">Users</a>
    </li>
    <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
      <a href="/orders">All Orders</a>
    </li>
    <li th:if="${session.loggedInUser?.role == 'ADMIN'}">
      <a href="/inventory">Inventory</a>
    </li>

    <!-- Any logged-in user -->
    <li th:if="${session.loggedInUser != null}">
      <a href="/cart">🛒 Cart</a>
    </li>
    <li th:if="${session.loggedInUser != null}">
      <a href="/orders/history">My Orders</a>
    </li>
    <li th:if="${session.loggedInUser != null}">
      <a href="/reviews">Reviews</a>
    </li>
    <li th:if="${session.loggedInUser != null}">
      <a href="/users/profile"
         style="color:var(--accent);">
        👤 <span th:text="${session.loggedInUser?.username}">
                </span>
      </a>
    </li>

    <!-- Guest only -->
    <li th:if="${session.loggedInUser == null}">
      <a href="/users/login">Login</a>
    </li>
    <li th:if="${session.loggedInUser == null}">
      <a href="/users/register">Register</a>
    </li>

    <!-- Logout -->
    <li th:if="${session.loggedInUser != null}">
      <a href="/users/logout"
         style="color:rgba(255,150,150,0.85);">
        Logout
      </a>
    </li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <h1
            style="font-family:'Fredoka One',cursive;font-size:1.7rem; color:var(--secondary);display:flex;align-items:center;gap:8px;">
      Edit User
    </h1>
    <a href="/users" class="btn btn-outline">← Back to Users</a>
  </div>

  <p style="color:var(--muted);font-size:0.8rem;margin-bottom:1.25rem;font-weight:600;">
    Editing: <strong style="color:var(--secondary);" th:text="${user.userId}"></strong>
  </p>

  <div class="card">
    <form th:action="@{/users/edit/{id}(id=${user.userId})}" method="post">
      <div class="form-grid">

        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" th:value="${user.username}" required />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="text" name="email" th:value="${user.email}" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" th:value="${user.password}" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" name="phone" th:value="${user.phone}" placeholder="07XXXXXXXX" />
        </div>

        <div class="form-group">
          <label>Role</label>
          <select name="role">
            <option value="CUSTOMER" th:selected="${user.role == 'CUSTOMER'}">
              Customer
            </option>
            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">
              Admin
            </option>
          </select>
        </div>

        <div class="form-group full">
          <label>Address</label>
          <textarea name="address" th:text="${user.address}" style="min-height:70px;"></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          Save Changes
        </button>
        <a href="/users" class="btn btn-outline">Cancel</a>
        <a th:href="@{/users/delete/{id}(id=${user.userId})}" class="btn btn-danger" style="margin-left:auto;"
           onclick="return confirm('Delete this user permanently?')">
          Delete User
        </a>
      </div>
    </form>
  </div>
</div>

</body>

</html>
