<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password - ToyMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<nav class="navbar">
    <a href="/" class="navbar-brand">ToyMart</a>
    <ul class="navbar-nav">
        <li><a href="/toys">Catalog</a></li>
        <li><a href="/users/login">Login</a></li>
    </ul>
</nav>
<main class="auth-shell auth-login-shell">
    <section class="auth-panel">
        <aside class="auth-visual auth-visual-login">
            <a href="/" class="auth-panel-brand">ToyMart</a>
            <div class="auth-visual-copy">
                <h2>Create a new password.</h2>
                <p>Use the OTP from your email to safely update your account password.</p>
            </div>
            <p class="auth-copyright">&copy; 2026 Online Toy Store</p>
        </aside>
        <section class="auth-form-card">
            <p class="section-eyebrow">OTP reset</p>
            <h1>Reset Password</h1>
            <p class="auth-subtitle">OTP sent to <strong th:text="${email}">email</strong>.</p>
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>
            <form th:action="@{/users/reset-password}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="otp">OTP Code</label>
                    <input id="otp" name="otp" type="text" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required autofocus/>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input id="password" name="password" type="password" minlength="6" placeholder="At least 6 characters" required/>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" placeholder="Repeat password" required/>
                </div>
                <button type="submit" class="auth-submit">Reset Password</button>
            </form>
        </section>
    </section>
</main>
</body>
</html>
