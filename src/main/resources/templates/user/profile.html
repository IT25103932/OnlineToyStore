<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Profile — ToyVault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .profile-header { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
        .profile-avatar { width:72px; height:72px; border-radius:50%; background:var(--accent-dim);
            color:var(--accent); font-size:1.8rem; display:flex; align-items:center; justify-content:center;
            border: 2px solid var(--accent-glow); font-weight:700; }
        .profile-meta h2 { font-size:1.2rem; font-weight:600; color:var(--text); }
        .profile-meta p { font-size:0.82rem; color:var(--text-muted); }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🧸</div><div class="brand-text">ToyVault<small>Admin Panel</small></div></div>
    <span class="nav-label">Overview</span>
    <a href="/" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
    <span class="nav-label">Catalogue</span>
    <a href="/toys" class="nav-item"><span class="nav-icon">⊡</span> Toys</a>
    <a href="/inventory" class="nav-item"><span class="nav-icon">⊞</span> Inventory</a>
    <span class="nav-label">Commerce</span>
    <a href="/cart" class="nav-item"><span class="nav-icon">⊟</span> Cart</a>
    <a href="/orders" class="nav-item"><span class="nav-icon">⊕</span> Orders</a>
    <span class="nav-label">Community</span>
    <a href="/reviews" class="nav-item"><span class="nav-icon">⊙</span> Reviews</a>
    <span class="nav-label">Accounts</span>
    <a href="/users" class="nav-item active"><span class="nav-icon">⊚</span> Users</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-item"><span class="nav-icon">↩</span> Logout</a></div>
</aside>

<main class="main">
    <div class="page-header">
        <div>
            <div class="eyebrow">Account</div>
            <h1>My Profile</h1>
        </div>
        <div class="page-actions">
            <a href="/users" class="btn btn-ghost">← Users</a>
        </div>
    </div>

    <div class="form-wrap">
        <div class="profile-header">
            <div class="profile-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.username,0,1))}">U</div>
            <div class="profile-meta">
                <h2 th:text="${user.username}">Username</h2>
                <p th:text="${user.email}">email@example.com</p>
                <span class="badge badge-accent" th:text="${user.role}">CUSTOMER</span>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/profile/update}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input class="form-input" type="email" name="email" th:value="${user.email}" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input class="form-input" type="password" name="password" placeholder="Leave blank to keep current"/>
                </div>
                <div class="form-group span-2">
                    <label class="form-label">Delivery Address</label>
                    <textarea class="form-textarea" name="address" th:text="${user.address}"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
